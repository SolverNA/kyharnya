<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кухарня — Админ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #f1f5f9;
            --surface:  #ffffff;
            --border:   #e2e8f0;
            --border2:  #cbd5e1;
            --accent:   #f59e0b;
            --danger:   #ef4444;
            --success:  #10b981;
            --text:     #0f172a;
            --text2:    #475569;
            --muted:    #94a3b8;
            --card:     #f8fafc;
            --input-bg: #ffffff;
            --tab-bg:   #f1f5f9;
            --shadow:   0 1px 4px rgba(0,0,0,0.08);
            --shadow-lg:0 8px 24px rgba(0,0,0,0.1);
            --overlay:  rgba(0,0,0,0.5);
            --approved-border: #bbf7d0;
            --approved-pill-bg:#dcfce7;
            --approved-pill-c: #166534;
            --rejected-border: #fecaca;
            --rejected-pill-bg:#fee2e2;
            --rejected-pill-c: #991b1b;
            --pending-border:  #c7d2fe;
            --pending-pill-bg: #e0e7ff;
            --pending-pill-c:  #3730a3;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg:       #0a0a0f;
                --surface:  #13131a;
                --border:   #1e1e2e;
                --border2:  #2e2e42;
                --accent:   #f59e0b;
                --danger:   #f87171;
                --success:  #34d399;
                --text:     #e2e8f0;
                --text2:    #94a3b8;
                --muted:    #475569;
                --card:     #0f0f18;
                --input-bg: #0a0a0f;
                --tab-bg:   #0a0a0f;
                --shadow:   0 1px 4px rgba(0,0,0,0.3);
                --shadow-lg:0 8px 24px rgba(0,0,0,0.5);
                --overlay:  rgba(0,0,0,0.85);
                --approved-border: #065f46;
                --approved-pill-bg:#065f46;
                --approved-pill-c: #6ee7b7;
                --rejected-border: #7f1d1d;
                --rejected-pill-bg:#7f1d1d;
                --rejected-pill-c: #fca5a5;
                --pending-border:  #312e81;
                --pending-pill-bg: #312e81;
                --pending-pill-c:  #a5b4fc;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Login ── */
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box {
            width: 340px;
            padding: 44px 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .login-logo {
            font-family: 'Unbounded', sans-serif;
            font-size: 30px;
            font-weight: 900;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .login-sub {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 36px;
        }

        .login-box input {
            width: 100%;
            padding: 13px 15px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 11px;
            color: var(--text);
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Manrope', sans-serif;
        }

        .login-box input:focus { border-color: var(--accent); }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 11px;
            font-family: 'Unbounded', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-login:hover  { opacity: 0.9; }
        .btn-login:active { transform: scale(0.98); }
        .login-error { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 18px; }

        /* ── App shell ── */
        #adminApp { display: none; }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .topbar-logo {
            font-family: 'Unbounded', sans-serif;
            font-size: 15px;
            font-weight: 900;
            color: var(--accent);
        }

        .topbar-right { display: flex; align-items: center; gap: 10px; }

        .tab-nav {
            display: flex;
            gap: 3px;
            background: var(--tab-bg);
            padding: 3px;
            border-radius: 9px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 7px;
            background: transparent;
            color: var(--muted);
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .tab-btn.active {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border2);
            box-shadow: var(--shadow);
        }

        .btn-logout {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        /* ── Content ── */
        .content { max-width: 1100px; margin: 0 auto; padding: 24px 18px; }
        .section { display: none; }
        .section.active { display: block; }

        /* ── Month bar ── */
        .month-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .month-bar > button.nav-arrow {
            width: 32px; height: 32px;
            flex-shrink: 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.15s;
            display: flex; align-items: center; justify-content: center;
        }

        .month-bar > button.nav-arrow:hover { border-color: var(--accent); }

        .month-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 12px;
            font-weight: 700;
            min-width: 130px;
            text-align: center;
        }

        /* Sort dropdown */
        .sort-select {
            padding: 6px 10px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        .btn-add {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Unbounded', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.15s;
        }

        .btn-add:hover { opacity: 0.88; }

        .btn-refresh {
            padding: 6px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text2);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: border-color 0.15s;
        }

        .btn-refresh:hover { border-color: var(--accent); }

        /* ── Posts grid ── */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
            gap: 14px;
        }

        .post-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: visible;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s;
            position: relative;
        }

        .post-card:hover { box-shadow: var(--shadow-lg); }

        /* status border only — no background fill */
        .post-card.approved { border-color: var(--approved-border); }
        .post-card.rejected { border-color: var(--rejected-border); }
        .post-card.pending  { border-color: var(--pending-border); }

        .post-card-img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            display: block;
            border-radius: 15px 15px 0 0;
            background: var(--border);
        }

        .post-img-placeholder {
            height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            background: var(--card);
            border-radius: 15px 15px 0 0;
        }

        .post-card-body { padding: 12px; }

        .post-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .post-chef {
            font-family: 'Unbounded', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
        }

        .status-pill {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 2px 7px;
            border-radius: 5px;
        }

        .status-pill.approved { background: var(--approved-pill-bg); color: var(--approved-pill-c); }
        .status-pill.rejected { background: var(--rejected-pill-bg); color: var(--rejected-pill-c); }
        .status-pill.pending  { background: var(--pending-pill-bg);  color: var(--pending-pill-c); }

        .post-date {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        /* Action row: approve + reject + ••• menu */
        .post-actions {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .btn-sm {
            flex: 1;
            padding: 6px 8px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .btn-sm.approve:hover { color: var(--success); border-color: var(--approved-border); }
        .btn-sm.reject:hover  { color: var(--danger);  border-color: var(--rejected-border); }

        /* Three-dots menu */
        .dots-menu { position: relative; }

        .btn-dots {
            width: 30px; height: 30px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.15s;
            letter-spacing: -1px;
        }

        .btn-dots:hover { border-color: var(--border2); color: var(--text); }

        .dots-dropdown {
            display: none;
            position: absolute;
            right: 0; bottom: 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            min-width: 150px;
            z-index: 50;
            overflow: hidden;
        }

        .dots-dropdown.open { display: block; }

        .dots-item {
            display: block;
            width: 100%;
            padding: 10px 14px;
            background: transparent;
            border: none;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            cursor: pointer;
            transition: background 0.1s;
            font-family: 'Manrope', sans-serif;
        }

        .dots-item:hover { background: var(--card); }
        .dots-item.danger { color: var(--danger); }
        .dots-item.danger:hover { background: #fef2f2; }
        @media (prefers-color-scheme: dark) {
            .dots-item.danger:hover { background: #2d0a0a; }
        }

        /* ── Data table ── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .data-table th {
            background: var(--card);
            padding: 10px 14px;
            text-align: left;
            font-family: 'Unbounded', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text);
            vertical-align: middle;
        }

        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: var(--card); }

        .chef-select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-size: 13px;
            padding: 5px 9px;
            cursor: pointer;
            outline: none;
            font-family: 'Manrope', sans-serif;
        }

        .btn-save {
            padding: 5px 11px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 7px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-del {
            padding: 5px 9px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--muted);
            font-size: 12px;
            cursor: pointer;
            margin-left: 4px;
            transition: all 0.15s;
        }

        .btn-del:hover { border-color: var(--danger); color: var(--danger); }

        .user-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .mono { font-size: 11px; color: var(--muted); font-family: monospace; }

        /* ── Empty ── */
        .empty { text-align: center; padding: 52px 20px; color: var(--muted); }
        .empty-icon { font-size: 40px; margin-bottom: 10px; }
        .empty-text { font-size: 14px; }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 22px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 11px;
            font-size: 13px; font-weight: 600;
            transition: transform 0.3s ease;
            z-index: 999;
            pointer-events: none;
            box-shadow: var(--shadow-lg);
        }

        #toast.show    { transform: translateX(-50%) translateY(0); }
        #toast.success { border-color: var(--success); color: var(--success); }
        #toast.error   { border-color: var(--danger);  color: var(--danger); }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: var(--overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 16px;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%; max-width: 480px;
            padding: 26px 22px;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-box h3 {
            font-family: 'Unbounded', sans-serif;
            font-size: 13px; font-weight: 700;
            margin-bottom: 18px;
            color: var(--text);
        }

        .form-field { margin-bottom: 14px; }

        .form-field label {
            display: block;
            font-size: 10px; font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .form-field input,
        .form-field select {
            width: 100%;
            padding: 10px 13px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Manrope', sans-serif;
        }

        .form-field input:focus,
        .form-field select:focus { border-color: var(--accent); }

        /* Image upload */
        .img-upload-area {
            border: 2px dashed var(--border2);
            border-radius: 11px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: var(--card);
            position: relative;
            transition: border-color 0.2s;
        }

        .img-upload-area:hover { border-color: var(--accent); }

        .img-upload-area input[type=file] {
            position: absolute; inset: 0;
            opacity: 0; cursor: pointer;
            width: 100%; height: 100%;
            padding: 0; border: none; background: none;
        }

        .img-upload-area img {
            max-height: 140px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            object-fit: cover;
        }

        .img-placeholder { color: var(--muted); font-size: 13px; }
        .img-placeholder span { font-size: 28px; display: block; margin-bottom: 5px; }

        .modal-footer { display: flex; gap: 8px; margin-top: 18px; }

        .btn-cancel {
            flex: 1; padding: 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text2);
            font-weight: 600; font-size: 13px;
            cursor: pointer;
        }

        .btn-submit {
            flex: 2; padding: 10px;
            background: var(--accent);
            color: #000; border: none;
            border-radius: 9px;
            font-family: 'Unbounded', sans-serif;
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-submit:hover    { opacity: 0.88; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <div class="login-logo">Кухарня</div>
        <div class="login-sub">Admin Panel</div>
        <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="current-password">
        <button class="btn-login" onclick="login()">ВОЙТИ</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<div id="adminApp">
    <div class="topbar">
        <div class="topbar-logo">🍳 КУХАРНЯ</div>
        <div class="topbar-right">
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('posts')">Посты</button>
                <button class="tab-btn"        onclick="switchTab('planning')">Планирование</button>
                <button class="tab-btn"        onclick="switchTab('users')">Пользователи</button>
            </div>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="content">

        <!-- Posts -->
        <div id="section-posts" class="section active">
            <div class="month-bar">
                <button class="nav-arrow" onclick="changeMonth(-1)">❮</button>
                <span class="month-label" id="monthLabel"></span>
                <button class="nav-arrow" onclick="changeMonth(1)">❯</button>
                <select class="sort-select" id="sortSelect" onchange="renderPosts()">
                    <option value="date-desc">📅 Дата ↓</option>
                    <option value="date-asc">📅 Дата ↑</option>
                    <option value="time-desc">⏰ Время ↓</option>
                    <option value="time-asc">⏰ Время ↑</option>
                    <option value="chef">👨‍🍳 Повар</option>
                    <option value="status">✅ Статус</option>
                </select>
                <button class="btn-add" onclick="openAddModal()">＋ Добавить</button>
                <button class="btn-refresh" onclick="loadPosts()">↻ Обновить</button>
            </div>
            <div id="postsContainer">
                <div class="empty"><div class="empty-icon">🍽️</div><div class="empty-text">Загрузка...</div></div>
            </div>
        </div>

        <!-- Planning -->
        <div id="section-planning" class="section">
            <div class="month-bar">
                <button class="nav-arrow" onclick="changeMonth(-1)">❮</button>
                <span class="month-label" id="monthLabelPlan"></span>
                <button class="nav-arrow" onclick="changeMonth(1)">❯</button>
                <button class="btn-refresh" onclick="loadPlanning()">↻ Обновить</button>
            </div>
            <div id="planningContainer"></div>
        </div>

        <!-- Users -->
        <div id="section-users" class="section">
            <div id="usersContainer">
                <div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Загрузка...</div></div>
            </div>
        </div>

    </div>
</div>

<!-- Add Post Modal -->
<div id="addModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeAddModal()">
    <div class="modal-box">
        <h3>➕ Новый пост</h3>

        <div class="form-field">
            <label>Дата</label>
            <input type="date" id="ap-date">
        </div>
        <div class="form-field">
            <label>Повар</label>
            <select id="ap-chef">
                <option>ГИЗАР</option><option>ВИОЛЕТТА</option><option>КАМИЛЬ</option>
            </select>
        </div>
        <div class="form-field">
            <label>Автор (имя отправителя)</label>
            <input type="text" id="ap-author" placeholder="Оставь пустым = имя повара">
        </div>
        <div class="form-field">
            <label>Время</label>
            <input type="time" id="ap-time">
        </div>
        <div class="form-field">
            <label>Статус</label>
            <select id="ap-status">
                <option value="approved">✅ Одобрен</option>
                <option value="pending">🗳 На голосовании</option>
                <option value="rejected">🚫 Отклонён</option>
            </select>
        </div>
        <div class="form-field">
            <label>Фото — файл</label>
            <div class="img-upload-area">
                <input type="file" accept="image/*" onchange="handleFile(event)">
                <div id="ap-preview">
                    <div class="img-placeholder"><span>📷</span>Нажмите чтобы выбрать</div>
                </div>
            </div>
        </div>
        <div class="form-field">
            <label>Фото — URL (альтернатива)</label>
            <input type="url" id="ap-url" placeholder="https://..." oninput="handleUrl(this.value)">
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeAddModal()">Отмена</button>
            <button class="btn-submit" id="ap-submit" onclick="submitPost()">СОЗДАТЬ ПОСТ</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const CHEFS = ["ГИЗАР", "ВИОЛЕТТА", "КАМИЛЬ"];
let viewDate   = new Date();
let currentTab = "posts";
let allPosts   = []; // cached for re-sort
let apB64      = null;

// ── Auth ──────────────────────────────────────────────
async function login() {
    const pw    = document.getElementById("passwordInput").value;
    const errEl = document.getElementById("loginError");
    errEl.textContent = "";

    const res = await fetch("/api/admin/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pw }),
    });

    if (res.ok) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("adminApp").style.display    = "block";
        initApp();
    } else {
        errEl.textContent = (await res.json()).error || "Ошибка";
    }
}

function logout() {
    document.cookie = "admin_token=; Max-Age=0; Path=/";
    location.reload();
}

document.getElementById("passwordInput").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
});

if (document.cookie.includes("admin_token=")) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("adminApp").style.display    = "block";
    initApp();
}

function initApp() {
    updateMonthLabels();
    loadPosts();
    loadUsers();
}

// ── Tabs ──────────────────────────────────────────────
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab-btn").forEach((b, i) =>
        b.classList.toggle("active", ["posts","planning","users"][i] === tab));
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(`section-${tab}`).classList.add("active");

    if (tab === "posts")    loadPosts();
    if (tab === "planning") loadPlanning();
    if (tab === "users")    loadUsers();
}

// ── Month ─────────────────────────────────────────────
function changeMonth(d) {
    viewDate.setMonth(viewDate.getMonth() + d);
    updateMonthLabels();
    if (currentTab === "posts")    loadPosts();
    if (currentTab === "planning") loadPlanning();
}

function getMonthPrefix() {
    return `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,"0")}`;
}

function updateMonthLabels() {
    const label = new Intl.DateTimeFormat("ru-RU", { month:"long", year:"numeric" }).format(viewDate);
    document.getElementById("monthLabel").textContent = label;
    const el = document.getElementById("monthLabelPlan");
    if (el) el.textContent = label;
}

// ── API ───────────────────────────────────────────────
async function api(method, path, body) {
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    if (res.status === 401) { logout(); return null; }
    return res.json();
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className   = `show ${type}`;
    setTimeout(() => { t.className = ""; }, 2400);
}

// ── Dots menu ─────────────────────────────────────────
// Close all open menus when clicking outside
document.addEventListener("click", e => {
    if (!e.target.closest(".dots-menu")) {
        document.querySelectorAll(".dots-dropdown.open")
            .forEach(d => d.classList.remove("open"));
    }
});

function toggleDots(id) {
    const dd = document.getElementById(id);
    const wasOpen = dd.classList.contains("open");
    document.querySelectorAll(".dots-dropdown.open").forEach(d => d.classList.remove("open"));
    if (!wasOpen) dd.classList.add("open");
}

// ── Posts ─────────────────────────────────────────────
async function loadPosts() {
    document.getElementById("postsContainer").innerHTML =
        `<div class="empty"><span class="spinner"></span> Загрузка...</div>`;

    const data = await api("GET", `/api/admin/posts?month=${getMonthPrefix()}`);
    if (!data) return;

    allPosts = [];
    Object.entries(data.posts || {}).forEach(([dateKey, dayPosts]) => {
        Object.entries(dayPosts || {}).forEach(([postKey, post]) => {
            allPosts.push({ dateKey, postKey, ...post });
        });
    });

    renderPosts();
}

function renderPosts() {
    const c      = document.getElementById("postsContainer");
    const sort   = document.getElementById("sortSelect")?.value || "date-desc";
    const sorted = [...allPosts].sort((a, b) => {
        if (sort === "date-desc") return b.dateKey.localeCompare(a.dateKey);
        if (sort === "date-asc")  return a.dateKey.localeCompare(b.dateKey);
        if (sort === "time-desc") return (b.time||"").localeCompare(a.time||"");
        if (sort === "time-asc")  return (a.time||"").localeCompare(b.time||"");
        if (sort === "chef")      return (a.chef||"").localeCompare(b.chef||"");
        if (sort === "status") {
            const ord = { approved:0, pending:1, rejected:2 };
            return (ord[a.status]??1) - (ord[b.status]??1);
        }
        return 0;
    });

    if (!sorted.length) {
        c.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><div class="empty-text">Постов нет</div></div>`;
        return;
    }

    c.innerHTML = `<div class="posts-grid">${sorted.map(_buildCard).join("")}</div>`;
}

function _buildCard(p) {
    const status = p.status || "pending";
    const imgSrc = (p.img && p.img !== "undefined") ? p.img : "";
    const labels = { approved:"ОДОБРЕН", rejected:"ОТКЛОНЁН", pending:"ГОЛОСОВАНИЕ" };
    const ddId   = `dd-${p.postKey}`;

    return `
        <div class="post-card ${status}">
            ${imgSrc
                ? `<img class="post-card-img" src="${imgSrc}" alt="" onerror="this.style.display='none'">`
                : `<div class="post-img-placeholder">🍽️</div>`}
            <div class="post-card-body">
                <div class="post-meta">
                    <span class="post-chef">${p.chef}</span>
                    <span class="status-pill ${status}">${labels[status]}</span>
                </div>
                <div class="post-date">📅 ${p.dateKey} · ⏰ ${p.time||"—"} · 👤 ${p.author||"—"}</div>
                <div class="post-actions">
                    <button class="btn-sm approve" onclick="patchPost('${p.dateKey}','${p.postKey}','approved')">✅ Одобрить</button>
                    <button class="btn-sm reject"  onclick="patchPost('${p.dateKey}','${p.postKey}','rejected')">🚫 Отклонить</button>
                    <div class="dots-menu">
                        <button class="btn-dots" onclick="toggleDots('${ddId}')">•••</button>
                        <div class="dots-dropdown" id="${ddId}">
                            <button class="dots-item" onclick="patchPost('${p.dateKey}','${p.postKey}','pending'); toggleDots('${ddId}')">🗳 В голосование</button>
                            <button class="dots-item danger" onclick="deletePost('${p.dateKey}','${p.postKey}')">🗑 Удалить</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
}

async function patchPost(dateKey, postKey, status) {
    const data = await api("PATCH", "/api/admin/posts", { dateKey, postKey, status });
    if (data?.ok) { showToast(`Статус: ${status}`); loadPosts(); }
    else showToast("Ошибка", "error");
}

async function deletePost(dateKey, postKey) {
    if (!confirm("Удалить пост?")) return;
    const data = await api("DELETE", "/api/admin/posts", { dateKey, postKey });
    if (data?.ok) { showToast("Пост удалён"); loadPosts(); }
    else showToast("Ошибка", "error");
}

// ── Add Post Modal ────────────────────────────────────
function openAddModal() {
    apB64 = null;
    const today = new Date().toISOString().slice(0,10);
    const now   = new Date().toTimeString().slice(0,5);
    document.getElementById("ap-date").value   = today;
    document.getElementById("ap-time").value   = now;
    document.getElementById("ap-chef").value   = CHEFS[0];
    document.getElementById("ap-author").value = "";
    document.getElementById("ap-status").value = "approved";
    document.getElementById("ap-url").value    = "";
    document.getElementById("ap-preview").innerHTML =
        `<div class="img-placeholder"><span>📷</span>Нажмите чтобы выбрать</div>`;
    document.getElementById("addModal").style.display = "flex";
}

function closeAddModal() {
    document.getElementById("addModal").style.display = "none";
}

function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        apB64 = ev.target.result;
        document.getElementById("ap-url").value = "";
        document.getElementById("ap-preview").innerHTML =
            `<img src="${apB64}" alt="preview">`;
    };
    reader.readAsDataURL(file);
}

function handleUrl(url) {
    if (!url) return;
    apB64 = null;
    document.getElementById("ap-preview").innerHTML =
        `<img src="${url}" alt="preview" onerror="this.style.opacity=0.3">`;
}

async function submitPost() {
    const dateKey = document.getElementById("ap-date").value;
    const chef    = document.getElementById("ap-chef").value;
    const author  = document.getElementById("ap-author").value.trim() || chef;
    const time    = document.getElementById("ap-time").value || "00:00";
    const status  = document.getElementById("ap-status").value;
    const imgUrl  = document.getElementById("ap-url").value.trim();

    if (!dateKey) { showToast("Укажи дату", "error"); return; }

    const btn = document.getElementById("ap-submit");
    btn.disabled = true; btn.textContent = "Сохранение...";

    let finalImg = imgUrl || apB64 || "";

    // Try upload to Cloudinary if base64
    if (apB64) {
        try {
            const envRes  = await fetch("/api/env");
            const envText = await envRes.text();
            const cn  = (envText.match(/CLOUDINARY_CLOUD_NAME["':\s]+["']([^"']+)["']/) || [])[1];
            const pre = (envText.match(/CLOUDINARY_UPLOAD_PRESET["':\s]+["']([^"']+)["']/) || [])[1];
            if (cn && pre) {
                const fd = new FormData();
                fd.append("file", apB64);
                fd.append("upload_preset", pre);
                fd.append("folder", "kyharnya");
                const r = await fetch(`https://api.cloudinary.com/v1_1/${cn}/image/upload`, { method:"POST", body:fd });
                const d = await r.json();
                if (d.secure_url) finalImg = d.secure_url;
            }
        } catch(_) {}
    }

    const data = await api("POST", "/api/admin/posts", {
        dateKey,
        postData: { img: finalImg, chef, author, authorId: "admin", time, status, votes: {} }
    });

    btn.disabled = false; btn.textContent = "СОЗДАТЬ ПОСТ";

    if (data?.ok) { showToast("Пост создан!"); closeAddModal(); loadPosts(); }
    else showToast("Ошибка создания", "error");
}

// ── Planning ──────────────────────────────────────────
async function loadPlanning() {
    const c = document.getElementById("planningContainer");
    c.innerHTML = `<div class="empty"><span class="spinner"></span> Загрузка...</div>`;

    const data = await api("GET", `/api/admin/planning?month=${getMonthPrefix()}`);
    if (!data) return;

    const year = viewDate.getFullYear(), month = viewDate.getMonth();
    const days = new Date(year, month+1, 0).getDate();
    const rows = [];

    for (let d = 1; d <= days; d++) {
        const dateKey = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        rows.push({ dateKey, chef: data.planning[dateKey]?.chef || "" });
    }

    c.innerHTML = `
        <table class="data-table">
            <thead><tr><th>Дата</th><th>Повар</th><th>Действие</th></tr></thead>
            <tbody>${rows.map(r => `
                <tr>
                    <td>${r.dateKey}</td>
                    <td>
                        <select class="chef-select" id="plan-${r.dateKey}">
                            <option value="">— Не назначен —</option>
                            ${CHEFS.map(c => `<option value="${c}" ${r.chef===c?"selected":""}>${c}</option>`).join("")}
                        </select>
                    </td>
                    <td>
                        <button class="btn-save" onclick="savePlan('${r.dateKey}')">Сохранить</button>
                        ${r.chef ? `<button class="btn-del" onclick="deletePlan('${r.dateKey}')">✕</button>` : ""}
                    </td>
                </tr>`).join("")}
            </tbody>
        </table>`;
}

async function savePlan(dateKey) {
    const chef = document.getElementById(`plan-${dateKey}`).value;
    if (!chef) { deletePlan(dateKey); return; }
    const data = await api("POST", "/api/admin/planning", { dateKey, chef });
    if (data?.ok) showToast(`${dateKey}: ${chef}`);
    else showToast("Ошибка", "error");
    loadPlanning();
}

async function deletePlan(dateKey) {
    const data = await api("DELETE", "/api/admin/planning", { dateKey });
    if (data?.ok) showToast("План удалён");
    else showToast("Ошибка", "error");
    loadPlanning();
}

// ── Users ─────────────────────────────────────────────
async function loadUsers() {
    const c = document.getElementById("usersContainer");
    c.innerHTML = `<div class="empty"><span class="spinner"></span> Загрузка...</div>`;

    const data = await api("GET", "/api/admin/users");
    if (!data) return;

    const users = Object.entries(data.users || {});
    if (!users.length) {
        c.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Нет пользователей</div></div>`;
        return;
    }

    c.innerHTML = `
        <table class="data-table">
            <thead><tr><th>Фото</th><th>Роль</th><th>ID</th><th>Chat ID</th><th>Действия</th></tr></thead>
            <tbody>${users.map(([uid, u]) => `
                <tr>
                    <td><img class="user-avatar" src="${u.photo||`https://ui-avatars.com/api/?name=${encodeURIComponent(u.name)}&background=4f46e5&color=fff`}" alt=""></td>
                    <td>
                        <select class="chef-select" id="role-${uid}">
                            ${CHEFS.map(c => `<option value="${c}" ${u.name===c?"selected":""}>${c}</option>`).join("")}
                        </select>
                    </td>
                    <td><span class="mono">${uid}</span></td>
                    <td><span class="mono">${u.chatId||"—"}</span></td>
                    <td>
                        <button class="btn-save" onclick="saveRole('${uid}')">Сохранить</button>
                        <button class="btn-del"  onclick="delUser('${uid}')">🗑</button>
                    </td>
                </tr>`).join("")}
            </tbody>
        </table>`;
}

async function saveRole(uid) {
    const name = document.getElementById(`role-${uid}`).value;
    const data = await api("PATCH", "/api/admin/users", { userId: uid, name });
    if (data?.ok) showToast(`Роль: ${name}`);
    else showToast("Ошибка", "error");
}

async function delUser(uid) {
    if (!confirm("Удалить пользователя?")) return;
    const data = await api("DELETE", "/api/admin/users", { userId: uid });
    if (data?.ok) { showToast("Удалён"); loadUsers(); }
    else showToast("Ошибка", "error");
}
</script>
</body>
</html>
