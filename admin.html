<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кухарня — Админ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── Light theme ── */
        :root {
            --bg:       #f1f5f9;
            --surface:  #ffffff;
            --border:   #e2e8f0;
            --border2:  #cbd5e1;
            --accent:   #f59e0b;
            --danger:   #ef4444;
            --success:  #10b981;
            --pending:  #6366f1;
            --text:     #0f172a;
            --text2:    #475569;
            --muted:    #94a3b8;
            --card:     #f8fafc;
            --input-bg: #ffffff;
            --topbar-bg: #ffffff;
            --tab-bg:   #f1f5f9;
            --shadow:   0 1px 4px rgba(0,0,0,0.08);
            --shadow-lg:0 8px 24px rgba(0,0,0,0.1);
            --overlay:  rgba(0,0,0,0.5);
            --approved-border: #bbf7d0;
            --approved-bg:     #f0fdf4;
            --approved-pill-bg:#dcfce7;
            --approved-pill-c: #166534;
            --rejected-border: #fecaca;
            --rejected-bg:     #fef2f2;
            --rejected-pill-bg:#fee2e2;
            --rejected-pill-c: #991b1b;
            --pending-border:  #c7d2fe;
            --pending-bg:      #f5f3ff;
            --pending-pill-bg: #e0e7ff;
            --pending-pill-c:  #3730a3;
        }

        /* ── Dark theme (system) ── */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg:       #0a0a0f;
                --surface:  #13131a;
                --border:   #1e1e2e;
                --border2:  #2e2e42;
                --accent:   #f59e0b;
                --danger:   #f87171;
                --success:  #34d399;
                --pending:  #818cf8;
                --text:     #e2e8f0;
                --text2:    #94a3b8;
                --muted:    #475569;
                --card:     #0f0f18;
                --input-bg: #0a0a0f;
                --topbar-bg:#13131a;
                --tab-bg:   #0a0a0f;
                --shadow:   0 1px 4px rgba(0,0,0,0.3);
                --shadow-lg:0 8px 24px rgba(0,0,0,0.5);
                --overlay:  rgba(0,0,0,0.8);
                --approved-border: #065f46;
                --approved-bg:     #022c22;
                --approved-pill-bg:#065f46;
                --approved-pill-c: #6ee7b7;
                --rejected-border: #7f1d1d;
                --rejected-bg:     #2d0a0a;
                --rejected-pill-bg:#7f1d1d;
                --rejected-pill-c: #fca5a5;
                --pending-border:  #312e81;
                --pending-bg:      #1e1b4b;
                --pending-pill-bg: #312e81;
                --pending-pill-c:  #a5b4fc;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        /* ── Login screen ── */
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box {
            width: 360px;
            padding: 48px 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .login-logo {
            font-family: 'Unbounded', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--accent);
            margin-bottom: 4px;
            letter-spacing: -1px;
        }

        .login-sub {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 40px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-box input:focus { border-color: var(--accent); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Unbounded', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-login:hover   { opacity: 0.9; }
        .btn-login:active  { transform: scale(0.98); }

        .login-error {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        /* ── Main layout ── */
        #adminApp { display: none; }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            background: var(--topbar-bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .topbar-logo {
            font-family: 'Unbounded', sans-serif;
            font-size: 16px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .topbar-right { display: flex; align-items: center; gap: 12px; }

        .tab-nav {
            display: flex;
            gap: 4px;
            background: var(--tab-bg);
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 7px;
            background: transparent;
            color: var(--muted);
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .tab-btn.active {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border2);
            box-shadow: var(--shadow);
        }

        .btn-logout {
            padding: 7px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        /* ── Content area ── */
        .content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 20px;
        }

        .section { display: none; }
        .section.active { display: block; }

        /* ── Month picker ── */
        .month-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .month-bar button {
            width: 34px; height: 34px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 15px;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .month-bar button:hover { border-color: var(--accent); }

        #monthLabel, #monthLabelPlan {
            font-family: 'Unbounded', sans-serif;
            font-size: 13px;
            font-weight: 700;
            min-width: 140px;
            text-align: center;
        }

        .btn-refresh {
            margin-left: auto;
            padding: 7px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text2);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .btn-refresh:hover { border-color: var(--accent); }

        /* ── ADD POST button ── */
        .btn-add-post {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Unbounded', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }

        .btn-add-post:hover  { opacity: 0.88; }
        .btn-add-post:active { transform: scale(0.97); }

        /* ── Posts grid ── */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 14px;
        }

        .post-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: box-shadow 0.2s;
            box-shadow: var(--shadow);
        }

        .post-card:hover { box-shadow: var(--shadow-lg); }
        .post-card.approved { border-color: var(--approved-border); background: var(--approved-bg); }
        .post-card.rejected { border-color: var(--rejected-border); background: var(--rejected-bg); }
        .post-card.pending  { border-color: var(--pending-border);  background: var(--pending-bg); }

        .post-card img {
            width: 100%;
            height: 175px;
            object-fit: cover;
            display: block;
        }

        .post-card-body { padding: 12px; }

        .post-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .post-chef {
            font-family: 'Unbounded', sans-serif;
            font-size: 11px;
            font-weight: 700;
        }

        .status-pill {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 3px 7px;
            border-radius: 6px;
        }

        .status-pill.approved { background: var(--approved-pill-bg); color: var(--approved-pill-c); }
        .status-pill.rejected { background: var(--rejected-pill-bg); color: var(--rejected-pill-c); }
        .status-pill.pending  { background: var(--pending-pill-bg);  color: var(--pending-pill-c); }

        .post-date {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .post-actions { display: flex; gap: 5px; }

        .btn-sm {
            flex: 1;
            padding: 6px 6px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-sm.approve:hover { background: var(--approved-bg); color: var(--success); border-color: var(--approved-border); }
        .btn-sm.reject:hover  { background: var(--rejected-bg); color: var(--danger);  border-color: var(--rejected-border); }
        .btn-sm.delete:hover  { background: var(--rejected-bg); color: var(--danger);  border-color: var(--danger); }

        /* ── Table shared ── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .data-table th {
            background: var(--card);
            padding: 11px 14px;
            text-align: left;
            font-family: 'Unbounded', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: middle;
            color: var(--text);
        }

        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: var(--card); }

        .chef-select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            padding: 6px 10px;
            cursor: pointer;
            outline: none;
        }

        .btn-save {
            padding: 6px 12px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-save:hover { opacity: 0.85; }

        .btn-del {
            padding: 6px 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            margin-left: 5px;
        }

        .btn-del:hover { border-color: var(--danger); color: var(--danger); }

        /* ── User avatar ── */
        .user-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--border);
        }

        .mono {
            font-size: 11px;
            color: var(--muted);
            font-family: monospace;
        }

        /* ── Empty state ── */
        .empty {
            text-align: center;
            padding: 56px 20px;
            color: var(--muted);
        }

        .empty-icon { font-size: 44px; margin-bottom: 10px; }
        .empty-text { font-size: 14px; }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 11px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            transition: transform 0.3s ease;
            z-index: 999;
            pointer-events: none;
            box-shadow: var(--shadow-lg);
        }

        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.success { border-color: var(--success); color: var(--success); }
        #toast.error   { border-color: var(--danger);  color: var(--danger); }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 15px; height: 15px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modal overlay ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 16px;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            padding: 28px 24px;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-box h3 {
            font-family: 'Unbounded', sans-serif;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
        }

        .form-field {
            margin-bottom: 16px;
        }

        .form-field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .form-field input,
        .form-field select,
        .form-field textarea {
            width: 100%;
            padding: 11px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-field input:focus,
        .form-field select:focus,
        .form-field textarea:focus { border-color: var(--accent); }

        .form-field textarea { resize: vertical; min-height: 80px; }

        /* Image upload area */
        .img-upload-area {
            border: 2px dashed var(--border2);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: var(--card);
            position: relative;
        }

        .img-upload-area:hover { border-color: var(--accent); }
        .img-upload-area input[type=file] {
            position: absolute; inset: 0;
            opacity: 0; cursor: pointer;
            width: 100%; height: 100%;
            padding: 0; border: none; background: none;
        }

        .img-upload-area img {
            max-height: 160px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            object-fit: cover;
        }

        .img-upload-placeholder { color: var(--muted); font-size: 13px; }
        .img-upload-placeholder span { font-size: 32px; display: block; margin-bottom: 6px; }

        /* Modal footer buttons */
        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-modal-cancel {
            flex: 1;
            padding: 11px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text2);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .btn-modal-cancel:hover { border-color: var(--border2); }

        .btn-modal-submit {
            flex: 2;
            padding: 11px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Unbounded', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-modal-submit:hover    { opacity: 0.88; }
        .btn-modal-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<!-- ================================================
     LOGIN SCREEN
     ================================================ -->
<div id="loginScreen">
    <div class="login-box">
        <div class="login-logo">Кухарня</div>
        <div class="login-sub">Admin Panel</div>
        <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="current-password">
        <button class="btn-login" onclick="login()">ВОЙТИ</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- ================================================
     ADMIN APP
     ================================================ -->
<div id="adminApp">

    <div class="topbar">
        <div class="topbar-logo">🍳 КУХАРНЯ</div>
        <div class="topbar-right">
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('posts')">Посты</button>
                <button class="tab-btn"        onclick="switchTab('planning')">Планирование</button>
                <button class="tab-btn"        onclick="switchTab('users')">Пользователи</button>
            </div>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="content">

        <!-- Posts -->
        <div id="section-posts" class="section active">
            <div class="month-bar">
                <button onclick="changeMonth(-1)">❮</button>
                <span id="monthLabel"></span>
                <button onclick="changeMonth(1)">❯</button>
                <button class="btn-add-post" onclick="openAddPostModal()">＋ Добавить пост</button>
                <button class="btn-refresh"  onclick="loadPosts()">↻</button>
            </div>
            <div id="postsContainer">
                <div class="empty"><div class="empty-icon">🍽️</div><div class="empty-text">Загрузка...</div></div>
            </div>
        </div>

        <!-- Planning -->
        <div id="section-planning" class="section">
            <div class="month-bar">
                <button onclick="changeMonth(-1)">❮</button>
                <span id="monthLabelPlan"></span>
                <button onclick="changeMonth(1)">❯</button>
                <button class="btn-refresh" onclick="loadPlanning()">↻ Обновить</button>
            </div>
            <div id="planningContainer"></div>
        </div>

        <!-- Users -->
        <div id="section-users" class="section">
            <div id="usersContainer">
                <div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Загрузка...</div></div>
            </div>
        </div>

    </div>
</div>

<!-- ================================================
     MODAL — Add post
     ================================================ -->
<div id="addPostModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeAddPostModal()">
    <div class="modal-box">
        <h3>➕ Новый пост</h3>

        <div class="form-field">
            <label>Дата</label>
            <input type="date" id="ap-date">
        </div>

        <div class="form-field">
            <label>Повар</label>
            <select id="ap-chef">
                <option value="ГИЗАР">ГИЗАР</option>
                <option value="ВИОЛЕТТА">ВИОЛЕТТА</option>
                <option value="КАМИЛЬ">КАМИЛЬ</option>
            </select>
        </div>

        <div class="form-field">
            <label>Автор (имя)</label>
            <input type="text" id="ap-author" placeholder="Кто публикует?">
        </div>

        <div class="form-field">
            <label>Время</label>
            <input type="time" id="ap-time">
        </div>

        <div class="form-field">
            <label>Статус</label>
            <select id="ap-status">
                <option value="approved">✅ Одобрен</option>
                <option value="pending">🗳 На голосовании</option>
                <option value="rejected">🚫 Отклонён</option>
            </select>
        </div>

        <div class="form-field">
            <label>Фото (необязательно)</label>
            <div class="img-upload-area" id="ap-upload-area">
                <input type="file" accept="image/*" onchange="handleImageSelect(event)">
                <div id="ap-img-preview">
                    <div class="img-upload-placeholder">
                        <span>📷</span>
                        Нажмите чтобы загрузить фото
                    </div>
                </div>
            </div>
        </div>

        <div class="form-field">
            <label>Или URL фото</label>
            <input type="url" id="ap-img-url" placeholder="https://..." oninput="handleImgUrl(this.value)">
        </div>

        <div class="modal-footer">
            <button class="btn-modal-cancel" onclick="closeAddPostModal()">Отмена</button>
            <button class="btn-modal-submit" id="ap-submit" onclick="submitAddPost()">СОЗДАТЬ ПОСТ</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────
const CHEFS = ["ГИЗАР", "ВИОЛЕТТА", "КАМИЛЬ"];
let viewDate   = new Date();
let currentTab = "posts";
let apImageB64 = null; // base64 from file picker

// ── Auth ──────────────────────────────────────────────
async function login() {
    const password = document.getElementById("passwordInput").value;
    const errEl    = document.getElementById("loginError");
    errEl.textContent = "";

    const res = await fetch("/api/admin/auth", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ password }),
    });

    if (res.ok) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("adminApp").style.display    = "block";
        initApp();
    } else {
        const data = await res.json();
        errEl.textContent = data.error || "Ошибка";
    }
}

function logout() {
    document.cookie = "admin_token=; Max-Age=0; Path=/";
    location.reload();
}

document.getElementById("passwordInput").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
});

if (document.cookie.includes("admin_token=")) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("adminApp").style.display    = "block";
    initApp();
}

// ── Init ──────────────────────────────────────────────
function initApp() {
    updateMonthLabels();
    loadPosts();
    loadUsers();
}

// ── Tabs ──────────────────────────────────────────────
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab-btn").forEach((b, i) => {
        b.classList.toggle("active", ["posts","planning","users"][i] === tab);
    });
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(`section-${tab}`).classList.add("active");

    if (tab === "posts")    loadPosts();
    if (tab === "planning") loadPlanning();
    if (tab === "users")    loadUsers();
}

// ── Month navigation ──────────────────────────────────
function changeMonth(delta) {
    viewDate.setMonth(viewDate.getMonth() + delta);
    updateMonthLabels();
    if (currentTab === "posts")    loadPosts();
    if (currentTab === "planning") loadPlanning();
}

function getMonthPrefix() {
    const y = viewDate.getFullYear();
    const m = String(viewDate.getMonth() + 1).padStart(2, "0");
    return `${y}-${m}`;
}

function updateMonthLabels() {
    const label = new Intl.DateTimeFormat("ru-RU", { month: "long", year: "numeric" }).format(viewDate);
    document.getElementById("monthLabel").textContent = label;
    const el = document.getElementById("monthLabelPlan");
    if (el) el.textContent = label;
}

// ── API helper ────────────────────────────────────────
async function api(method, path, body) {
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    if (res.status === 401) { logout(); return null; }
    return res.json();
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className   = `show ${type}`;
    setTimeout(() => { t.className = ""; }, 2500);
}

// ── Posts ─────────────────────────────────────────────
async function loadPosts() {
    const c = document.getElementById("postsContainer");
    c.innerHTML = `<div class="empty"><span class="spinner"></span> Загрузка...</div>`;

    const data = await api("GET", `/api/admin/posts?month=${getMonthPrefix()}`);
    if (!data) return;

    const posts = [];
    Object.entries(data.posts || {}).forEach(([dateKey, dayPosts]) => {
        Object.entries(dayPosts || {}).forEach(([postKey, post]) => {
            posts.push({ dateKey, postKey, ...post });
        });
    });

    posts.sort((a, b) => b.dateKey.localeCompare(a.dateKey));

    if (!posts.length) {
        c.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><div class="empty-text">Постов за этот месяц нет</div></div>`;
        return;
    }

    c.innerHTML = `<div class="posts-grid">${posts.map(_buildPostCard).join("")}</div>`;
}

function _buildPostCard(p) {
    const status = p.status || "pending";
    const imgSrc = (p.img && p.img !== "undefined") ? p.img : "";
    const labels = { approved:"ОДОБРЕН", rejected:"ОТКЛОНЁН", pending:"ГОЛОСОВАНИЕ" };

    return `
        <div class="post-card ${status}">
            ${imgSrc
                ? `<img src="${imgSrc}" alt="" onerror="this.style.display='none'">`
                : `<div style="height:175px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:36px;">🍽️</div>`}
            <div class="post-card-body">
                <div class="post-meta">
                    <span class="post-chef">${p.chef}</span>
                    <span class="status-pill ${status}">${labels[status]}</span>
                </div>
                <div class="post-date">📅 ${p.dateKey} · ⏰ ${p.time || "—"} · 👤 ${p.author || "—"}</div>
                <div class="post-actions">
                    <button class="btn-sm approve" onclick="patchPost('${p.dateKey}','${p.postKey}','approved')">✅</button>
                    <button class="btn-sm reject"  onclick="patchPost('${p.dateKey}','${p.postKey}','rejected')">🚫</button>
                    <button class="btn-sm delete"  onclick="deletePost('${p.dateKey}','${p.postKey}')">🗑</button>
                </div>
            </div>
        </div>`;
}

async function patchPost(dateKey, postKey, status) {
    const data = await api("PATCH", "/api/admin/posts", { dateKey, postKey, status });
    if (data?.ok) { showToast(`Статус: ${status}`); loadPosts(); }
    else showToast("Ошибка", "error");
}

async function deletePost(dateKey, postKey) {
    if (!confirm("Удалить пост?")) return;
    const data = await api("DELETE", "/api/admin/posts", { dateKey, postKey });
    if (data?.ok) { showToast("Пост удалён"); loadPosts(); }
    else showToast("Ошибка", "error");
}

// ── Add Post Modal ────────────────────────────────────
function openAddPostModal() {
    apImageB64 = null;
    const today = new Date().toISOString().split("T")[0];
    const now   = new Date().toTimeString().slice(0,5);

    document.getElementById("ap-date").value   = today;
    document.getElementById("ap-time").value   = now;
    document.getElementById("ap-chef").value   = CHEFS[0];
    document.getElementById("ap-author").value = "";
    document.getElementById("ap-status").value = "approved";
    document.getElementById("ap-img-url").value = "";
    document.getElementById("ap-img-preview").innerHTML = `
        <div class="img-upload-placeholder">
            <span>📷</span>Нажмите чтобы загрузить фото
        </div>`;

    document.getElementById("addPostModal").style.display = "flex";
}

function closeAddPostModal() {
    document.getElementById("addPostModal").style.display = "none";
}

function handleImageSelect(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = ev => {
        apImageB64 = ev.target.result; // data:image/jpeg;base64,...
        document.getElementById("ap-img-url").value = "";
        document.getElementById("ap-img-preview").innerHTML =
            `<img src="${apImageB64}" alt="preview">`;
    };
    reader.readAsDataURL(file);
}

function handleImgUrl(url) {
    if (!url) return;
    apImageB64 = null;
    document.getElementById("ap-img-preview").innerHTML =
        url ? `<img src="${url}" alt="preview" onerror="this.style.opacity=0.3">` : `
        <div class="img-upload-placeholder"><span>📷</span>Нажмите чтобы загрузить фото</div>`;
}

async function submitAddPost() {
    const dateKey = document.getElementById("ap-date").value;
    const chef    = document.getElementById("ap-chef").value;
    const author  = document.getElementById("ap-author").value.trim() || chef;
    const time    = document.getElementById("ap-time").value || "00:00";
    const status  = document.getElementById("ap-status").value;
    const imgUrl  = document.getElementById("ap-img-url").value.trim();

    if (!dateKey) { showToast("Укажи дату", "error"); return; }

    const btn = document.getElementById("ap-submit");
    btn.disabled = true;
    btn.textContent = "Сохранение...";

    // Determine image: base64 from file picker → upload to Cloudinary
    // OR just use URL directly if provided
    let finalImg = imgUrl || apImageB64 || "";

    // If base64 — upload via existing /api/upload or directly to Cloudinary
    if (apImageB64) {
        try {
            const cloudName   = await getCloudinaryName();
            const uploadPreset = await getCloudinaryPreset();

            if (cloudName && uploadPreset) {
                const fd = new FormData();
                fd.append("file", apImageB64);
                fd.append("upload_preset", uploadPreset);
                fd.append("folder", "kyharnya");

                const r = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                    method: "POST", body: fd
                });
                const d = await r.json();
                if (d.secure_url) finalImg = d.secure_url;
            }
        } catch(e) {
            // Keep base64 as fallback (Firebase stores it inline)
            finalImg = apImageB64;
        }
    }

    const postData = {
        img:      finalImg,
        chef,
        author,
        authorId: "admin",
        time,
        status,
        votes:    {},
    };

    const data = await api("POST", "/api/admin/posts", { dateKey, postData });

    btn.disabled = false;
    btn.textContent = "СОЗДАТЬ ПОСТ";

    if (data?.ok) {
        showToast("Пост создан!");
        closeAddPostModal();
        loadPosts();
    } else {
        showToast("Ошибка создания", "error");
    }
}

// Fetch Cloudinary config from env endpoint
let _cloudEnvCache = null;
async function _getCloudEnv() {
    if (_cloudEnvCache) return _cloudEnvCache;
    try {
        const r = await fetch("/api/env");
        const text = await r.text();
        // eval the script to get window.ENV
        const match1 = text.match(/CLOUDINARY_CLOUD_NAME['":\s]+['"]([^'"]+)['"]/);
        const match2 = text.match(/CLOUDINARY_UPLOAD_PRESET['":\s]+['"]([^'"]+)['"]/);
        _cloudEnvCache = {
            cloudName:    match1?.[1] || "",
            uploadPreset: match2?.[1] || "",
        };
    } catch { _cloudEnvCache = { cloudName: "", uploadPreset: "" }; }
    return _cloudEnvCache;
}

async function getCloudinaryName()   { return (await _getCloudEnv()).cloudName; }
async function getCloudinaryPreset() { return (await _getCloudEnv()).uploadPreset; }

// ── Planning ──────────────────────────────────────────
async function loadPlanning() {
    document.getElementById("monthLabelPlan").textContent =
        new Intl.DateTimeFormat("ru-RU", { month: "long", year: "numeric" }).format(viewDate);

    const c = document.getElementById("planningContainer");
    c.innerHTML = `<div class="empty"><span class="spinner"></span> Загрузка...</div>`;

    const data = await api("GET", `/api/admin/planning?month=${getMonthPrefix()}`);
    if (!data) return;

    const year = viewDate.getFullYear(), month = viewDate.getMonth();
    const days = new Date(year, month + 1, 0).getDate();
    const rows = [];

    for (let d = 1; d <= days; d++) {
        const dateKey = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        rows.push({ dateKey, chef: data.planning[dateKey]?.chef || "" });
    }

    c.innerHTML = `
        <table class="data-table">
            <thead><tr><th>Дата</th><th>Повар</th><th>Действие</th></tr></thead>
            <tbody>
                ${rows.map(r => `
                    <tr>
                        <td>${r.dateKey}</td>
                        <td>
                            <select class="chef-select" id="plan-${r.dateKey}">
                                <option value="">— Не назначен —</option>
                                ${CHEFS.map(c => `<option value="${c}" ${r.chef===c?"selected":""}>${c}</option>`).join("")}
                            </select>
                        </td>
                        <td>
                            <button class="btn-save" onclick="savePlan('${r.dateKey}')">Сохранить</button>
                            ${r.chef ? `<button class="btn-del" onclick="deletePlan('${r.dateKey}')">✕</button>` : ""}
                        </td>
                    </tr>`).join("")}
            </tbody>
        </table>`;
}

async function savePlan(dateKey) {
    const chef = document.getElementById(`plan-${dateKey}`).value;
    if (!chef) { deletePlan(dateKey); return; }
    const data = await api("POST", "/api/admin/planning", { dateKey, chef });
    if (data?.ok) showToast(`${dateKey}: ${chef}`);
    else showToast("Ошибка", "error");
    loadPlanning();
}

async function deletePlan(dateKey) {
    const data = await api("DELETE", "/api/admin/planning", { dateKey });
    if (data?.ok) showToast("План удалён");
    else showToast("Ошибка", "error");
    loadPlanning();
}

// ── Users ─────────────────────────────────────────────
async function loadUsers() {
    const c = document.getElementById("usersContainer");
    c.innerHTML = `<div class="empty"><span class="spinner"></span> Загрузка...</div>`;

    const data = await api("GET", "/api/admin/users");
    if (!data) return;

    const users = Object.entries(data.users || {});

    if (!users.length) {
        c.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Пользователей нет</div></div>`;
        return;
    }

    c.innerHTML = `
        <table class="data-table">
            <thead><tr><th>Фото</th><th>Роль</th><th>ID</th><th>Chat ID</th><th>Действия</th></tr></thead>
            <tbody>
                ${users.map(([uid, u]) => `
                    <tr>
                        <td><img class="user-avatar" src="${u.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.name)}&background=4f46e5&color=fff`}" alt=""></td>
                        <td>
                            <select class="chef-select" id="role-${uid}">
                                ${CHEFS.map(c => `<option value="${c}" ${u.name===c?"selected":""}>${c}</option>`).join("")}
                            </select>
                        </td>
                        <td><span class="mono">${uid}</span></td>
                        <td><span class="mono">${u.chatId || "—"}</span></td>
                        <td>
                            <button class="btn-save" onclick="saveUserRole('${uid}')">Сохранить</button>
                            <button class="btn-del"  onclick="deleteUser('${uid}')">🗑</button>
                        </td>
                    </tr>`).join("")}
            </tbody>
        </table>`;
}

async function saveUserRole(userId) {
    const name = document.getElementById(`role-${userId}`).value;
    const data = await api("PATCH", "/api/admin/users", { userId, name });
    if (data?.ok) showToast(`Роль: ${name}`);
    else showToast("Ошибка", "error");
}

async function deleteUser(userId) {
    if (!confirm("Удалить пользователя?")) return;
    const data = await api("DELETE", "/api/admin/users", { userId });
    if (data?.ok) { showToast("Удалён"); loadUsers(); }
    else showToast("Ошибка", "error");
}
</script>
</body>
</html>
