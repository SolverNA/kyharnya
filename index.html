<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кухарня</title>

    <!-- ── Telegram Mini App SDK ──────────────── -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- ── Styles ─────────────────────────────── -->
    <link rel="stylesheet" href="style.css">

    <!-- ── Firebase SDK ───────────────────────── -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>

<header class="auth-header">
    <div id="fireStats" class="fire-stats">🔥 0</div>
    <div id="userProfile" class="user-pill" onclick="openStats()">
        <b>Загрузка...</b>
    </div>
    <div id="loginUI"  style="display:none;"></div>
    <div id="logoutUI" style="display:none;"></div>
</header>

<main class="container">
    <nav class="month-nav">
        <button onclick="moveMonth(-1)" style="border:none; background:none; font-size:20px; cursor:pointer;">❮</button>
        <b id="monthDisplay"></b>
        <button onclick="moveMonth(1)"  style="border:none; background:none; font-size:20px; cursor:pointer;">❯</button>
    </nav>

    <div class="calendar-grid" id="calendar"></div>

    <section id="dayView" hidden>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h2 id="selectedDateTitle" style="margin:0; font-size:18px;"></h2>
            <button onclick="document.getElementById('dayView').hidden=true"
                    style="border:none; background:#eee; padding:5px 10px; border-radius:8px;">✕</button>
        </div>

        <div id="dayLeaderboard" class="leaderboard-day"></div>
        <div id="actionContainer"></div>

        <div id="uploadForm" style="display:none; margin-top:15px;">
            <label style="font-size:12px; color:#64748b;">КТО ГОТОВИЛ СЕГОДНЯ?</label>
            <select id="chefSelect"
                    style="width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid #ddd;"></select>
            <button id="saveBtn" onclick="finalizePost()"
                    style="width:100%; padding:14px; background:var(--success); color:white;
                           border:none; border-radius:10px; font-weight:600;">
                Опубликовать
            </button>
        </div>

        <div id="planForm" style="display:none; margin-top:15px;">
            <label style="font-size:12px; color:#64748b;">НАЗНАЧИТЬ НА ЭТОТ ДЕНЬ:</label>
            <select id="planChefSelect"
                    style="width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid #ddd;"></select>
            <button onclick="savePlan()"
                    style="width:100%; padding:14px; background:var(--primary); color:white;
                           border:none; border-radius:10px; font-weight:600;">
                Сохранить план
            </button>
        </div>

        <div id="postHistory"></div>
    </section>
</main>

<div id="cameraOverlay">
    <video id="webcam" autoplay playsinline></video>
    <div style="height:25%; display:flex; flex-direction:column;
                justify-content:center; align-items:center; gap:20px;">
        <div class="shutter" onclick="capturePhoto()"></div>
        <button onclick="closeCamera()"
                style="background:none; border:none; color:white; cursor:pointer;">Отмена</button>
    </div>
</div>

<canvas id="photoCanvas" style="display:none;"></canvas>

<div id="statsModal" onclick="if(event.target === this) this.style.display='none'">
    <div class="modal-content">
        <h3>📊 Статистика Кухарни</h3>
        <table id="statsTable"></table>
        <div style="text-align:center; margin-top:20px;">
            <button onclick="document.getElementById('statsModal').style.display='none'"
                    style="padding:10px 20px; border:none; background:#eee; border-radius:8px;">Закрыть</button>
        </div>
    </div>
</div>

<div id="authModal" style="display:none;">
    <div class="modal-content">
        <div id="roleButtons"></div>
    </div>
</div>

<!-- ================================================
     SCRIPTS — порядок важен!
     ================================================ -->
<script src="config.js"></script>
<script src="firebase-init.js"></script>  <!-- db и auth доступны отсюда -->
<script src="auth.js"></script>
<script src="stats.js"></script>
<script src="calendar.js"></script>
<script src="dayView.js"></script>
<script src="camera.js"></script>
<script src="posts.js"></script>
<script src="app.js"></script>

<script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>

</body>
</html>
